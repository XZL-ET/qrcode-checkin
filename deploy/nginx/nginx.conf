# HTTP → 强制跳转 HTTPS（企微域名验证文件除外）
server {
    listen 80;
    server_name yhfw.gsxhsd.com;

    # 企业微信域名验证文件
    location = /WW_verify_Js64uCJlTXMxaTWa.txt {
        root /var/www/html;
        types { }
        default_type text/plain;
    }

    # 其他请求跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name yhfw.gsxhsd.com;

    ssl_certificate     /etc/letsencrypt/live/yhfw.gsxhsd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yhfw.gsxhsd.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 企业微信域名验证文件
    location = /WW_verify_Js64uCJlTXMxaTWa.txt {
        root /var/www/html;
        types { }
        default_type text/plain;
    }

    # 企微回调 → 活码管理平台
    location = /api/v1/callback/wecom {
        proxy_pass http://106.54.224.27/api/v1/callback/wecom;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== 签到系统路由 =====
    # Next.js 静态资源
    location /_next/ {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理后台页面
    location /admin {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 员工签到页面
    location /checkin {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 签到系统 API（长前缀优先匹配于 /api）
    location /api/admin {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/checkin {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/internal {
        proxy_pass http://qiandao-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 原有前端静态页面
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 原有后端 API（注意：放最后，长前缀优先匹配）
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
